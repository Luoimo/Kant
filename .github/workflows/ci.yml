name: Kant CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. 基础环境与代码规范检查
  prepare-and-lint:
    name: Preparation & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Basic Syntax Check
        run: |
          python -m pip install flake8
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics || true

  # 2. 后端核心功能测试
  backend-core-tests:
    name: Backend Core Tests
    needs: prepare-and-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run Core Tests
        env:
          PYTHONPATH: .
        run: pytest tests/ --ignore=tests/security --cov=. --cov-report=xml --junitxml=core-results.xml
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: core-test-results
          path: |
            backend/core-results.xml
            backend/coverage.xml

  # 3. AI 安全测试 (MLSecOps)
  backend-security-tests:
    name: AI Security Tests
    needs: prepare-and-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run Security Tests
        env:
          PYTHONPATH: .
        run: pytest tests/security --junitxml=security-results.xml
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: backend/security-results.xml

  # 4. 前端构建与测试
  frontend-build:
    name: Frontend Build
    needs: prepare-and-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build frontend
        run: npm run build

  # 5. 汇总节点 (用于 PR 保护分支状态检查)
  ci-success:
    name: CI Pipeline Passed
    needs: [backend-core-tests, backend-security-tests, frontend-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "CI Pipeline Failed!"
            exit 1
          else
            echo "All checks passed successfully!"
          fi
